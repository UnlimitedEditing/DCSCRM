<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #070709; color: #e2e2e8; font-family: 'Sora', sans-serif; line-height: 1.5; font-size: 14px; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #070709; } ::-webkit-scrollbar-thumb { background: #1e1e28; border-radius: 3px; }

  .app { min-height: 100vh; display: flex; flex-direction: column; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 52px; border-bottom: 1px solid #12121a; background: #070709; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: #b8ff20; letter-spacing: -0.02em; }
  .logo span { color: #2a2a38; }
  .header-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .agent-pill { font-family: 'Space Mono', monospace; font-size: 10px; color: #555; background: #0e0e14; border: 1px solid #1a1a24; border-radius: 100px; padding: 3px 10px; }
  .nav-btn { padding: 4px 12px; font-size: 10px; font-family: 'Space Mono', monospace; background: transparent; border: 1px solid #1a1a24; color: #444; border-radius: 3px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.06em; }
  .nav-btn:hover { border-color: #2a2a38; color: #777; }
  .nav-btn.active { border-color: #b8ff2030; color: #b8ff20; background: #b8ff2008; }

  .main { flex: 1; padding: 32px 16px; overflow-y: auto; }
  .container { max-width: 640px; margin: 0 auto; }

  /* Unlock */
  .unlock { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 28px; }
  .unlock-logo { font-family: 'Space Mono', monospace; font-size: 32px; font-weight: 700; color: #b8ff20; letter-spacing: -0.03em; }
  .unlock-sub { font-size: 13px; color: #3a3a4a; text-align: center; max-width: 280px; line-height: 1.7; }
  .unlock-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a4a; text-transform: uppercase; letter-spacing: 0.12em; text-align: center; margin-bottom: 8px; }
  .unlock-row { display: flex; gap: 8px; }
  .unlock-input { background: #0d0d12; border: 1px solid #1a1a24; color: #e2e2e8; padding: 11px 16px; font-size: 15px; font-family: 'Space Mono', monospace; border-radius: 4px; outline: none; width: 180px; letter-spacing: 0.25em; text-align: center; text-transform: uppercase; transition: border-color 0.2s; }
  .unlock-input:focus { border-color: #b8ff2060; }
  .unlock-error { font-size: 11px; color: #ff4466; font-family: 'Space Mono', monospace; text-align: center; }
  .unlock-hint { font-size: 11px; color: #2a2a38; text-align: center; font-family: 'Space Mono', monospace; }

  /* Progress */
  .progress { margin-bottom: 40px; }
  .progress-track { height: 1px; background: #12121c; margin-bottom: 12px; }
  .progress-fill { height: 100%; background: #b8ff20; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
  .progress-meta { display: flex; justify-content: space-between; }
  .progress-step-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #333; text-transform: uppercase; letter-spacing: 0.1em; }
  .progress-pct { font-family: 'Space Mono', monospace; font-size: 10px; color: #b8ff20; }

  /* Step headers */
  .step-eyebrow { font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a50; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 8px; }
  .step-title { font-size: 20px; font-weight: 600; color: #e8e8f0; margin-bottom: 6px; line-height: 1.25; }
  .step-desc { font-size: 13px; color: #4a4a60; line-height: 1.65; margin-bottom: 28px; }

  /* Fields */
  .field { margin-bottom: 16px; }
  .field-label { display: block; font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a50; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 7px; }
  .field-input, .field-select, .field-textarea { width: 100%; background: #0d0d12; border: 1px solid #1a1a24; color: #e2e2e8; padding: 10px 13px; font-size: 13px; font-family: 'Sora', sans-serif; border-radius: 4px; outline: none; transition: border-color 0.2s; }
  .field-input:focus, .field-select:focus, .field-textarea:focus { border-color: #b8ff2050; }
  .field-textarea { resize: vertical; min-height: 88px; }
  .field-select { cursor: pointer; }
  .field-select option { background: #0d0d12; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 6px 13px; border: 1px solid #1a1a24; border-radius: 100px; font-size: 12px; cursor: pointer; transition: all 0.15s; background: #0d0d12; color: #555; user-select: none; }
  .chip:hover { border-color: #2a2a38; color: #999; }
  .chip.on { background: #b8ff20; color: #000; border-color: #b8ff20; font-weight: 600; }
  .chip-input-row { display: flex; gap: 8px; margin-top: 10px; }
  .chip-input { flex: 1; background: #0d0d12; border: 1px solid #1a1a24; color: #e2e2e8; padding: 8px 12px; font-size: 12px; font-family: 'Sora', sans-serif; border-radius: 4px; outline: none; }
  .chip-input:focus { border-color: #b8ff2040; }
  .chip-add-btn { padding: 8px 14px; background: #b8ff2010; border: 1px solid #b8ff2025; color: #b8ff20; font-size: 11px; font-family: 'Space Mono', monospace; border-radius: 4px; cursor: pointer; white-space: nowrap; }
  .chip-add-btn:hover { background: #b8ff2020; }

  /* Features */
  .features { display: flex; flex-direction: column; gap: 4px; }
  .feat { display: flex; align-items: center; gap: 11px; padding: 9px 13px; border: 1px solid #10101a; border-radius: 4px; cursor: pointer; transition: all 0.15s; background: #09090e; user-select: none; }
  .feat:hover { border-color: #1a1a26; background: #0d0d14; }
  .feat.on { border-color: #b8ff2018; background: #b8ff2005; }
  .feat-box { width: 15px; height: 15px; border: 1px solid #252530; border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .feat.on .feat-box { background: #b8ff20; border-color: #b8ff20; }
  .feat-text { font-size: 12px; color: #666; }
  .feat.on .feat-text { color: #ccc; }

  /* Buttons */
  .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 40px; padding-top: 20px; border-top: 1px solid #0f0f16; }
  .btn { padding: 11px 22px; font-size: 11px; font-family: 'Space Mono', monospace; font-weight: 700; letter-spacing: 0.07em; border-radius: 4px; cursor: pointer; transition: all 0.15s; border: none; text-transform: uppercase; }
  .btn-primary { background: #b8ff20; color: #000; }
  .btn-primary:hover { background: #c8ff44; }
  .btn-primary:disabled { background: #1a1a22; color: #3a3a48; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: #444; border: 1px solid #1a1a24; }
  .btn-ghost:hover { border-color: #2a2a38; color: #888; }
  .btn-sm { padding: 7px 14px; font-size: 10px; }

  /* Assessment */
  .assessment-card { border: 1px solid #1a1a24; border-radius: 6px; overflow: hidden; }
  .assessment-top { background: #0d0d14; padding: 20px; border-bottom: 1px solid #12121c; }
  .complexity-badge { display: inline-block; padding: 3px 9px; border-radius: 3px; font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 14px; }
  .badge-Low { background: #b8ff2015; color: #b8ff20; border: 1px solid #b8ff2030; }
  .badge-Medium { background: #ffcc0015; color: #ffcc00; border: 1px solid #ffcc0030; }
  .badge-High { background: #ff880015; color: #ff8800; border: 1px solid #ff880030; }
  .badge-Scoping { background: #ff446615; color: #ff4466; border: 1px solid #ff446630; }
  .hours-display { font-size: 32px; font-weight: 700; color: #e8e8f0; font-family: 'Space Mono', monospace; }
  .hours-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a50; text-transform: uppercase; letter-spacing: 0.12em; margin-top: 4px; }
  .assessment-body { padding: 20px; }
  .assess-section { margin-bottom: 20px; }
  .assess-section-title { font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a50; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
  .assess-narrative { font-size: 13px; color: #777; line-height: 1.7; }
  .assess-list { list-style: none; }
  .assess-item { display: flex; gap: 9px; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid #0d0d12; }
  .assess-item:last-child { border-bottom: none; }
  .assess-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
  .dot-green { background: #b8ff20; }
  .dot-orange { background: #ff8800; }
  .assess-item-text { font-size: 12px; color: #777; line-height: 1.5; }
  .scoping-alert { background: #ff446606; border: 1px solid #ff446618; border-radius: 5px; padding: 14px; margin-bottom: 18px; }
  .scoping-alert-title { font-family: 'Space Mono', monospace; font-size: 10px; color: #ff4466; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 5px; }
  .scoping-alert-text { font-size: 12px; color: #aa3355; line-height: 1.6; }

  /* Loader */
  .loader { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 70px 20px; }
  .loader-ring { width: 40px; height: 40px; border: 2px solid #1a1a24; border-top-color: #b8ff20; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a50; letter-spacing: 0.12em; text-transform: uppercase; }

  /* Leads */
  .leads-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .leads-title { font-size: 17px; font-weight: 600; }
  .leads-count { font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a50; margin-top: 2px; }
  .leads-empty { text-align: center; padding: 60px 20px; color: #2a2a38; font-size: 13px; }
  .lead-card { border: 1px solid #10101a; border-radius: 5px; padding: 14px 16px; margin-bottom: 7px; cursor: pointer; transition: all 0.15s; background: #09090e; }
  .lead-card:hover { border-color: #1e1e2a; background: #0d0d14; }
  .lead-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .lead-company { font-weight: 600; font-size: 14px; }
  .lead-contact { font-size: 11px; color: #444; margin-top: 2px; }
  .lead-meta { display: flex; gap: 14px; flex-wrap: wrap; }
  .lead-meta-item { font-family: 'Space Mono', monospace; font-size: 10px; color: #2a2a3a; }
  .lead-meta-item span { color: #555; }
  .status-badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .status-pending { background: #ffcc0010; color: #ffcc00; border: 1px solid #ffcc0022; }
  .status-reviewed { background: #00aaff10; color: #00aaff; border: 1px solid #00aaff22; }
  .status-quoted { background: #b8ff2010; color: #b8ff20; border: 1px solid #b8ff2022; }
  .status-declined { background: #ff446610; color: #ff4466; border: 1px solid #ff446622; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: #000000cc; backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
  .modal { background: #09090e; border: 1px solid #1a1a24; border-radius: 8px; width: 100%; max-width: 600px; margin: auto; }
  .modal-header { padding: 18px 20px; border-bottom: 1px solid #10101a; display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { background: none; border: none; color: #333; font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; }
  .modal-close:hover { color: #777; }
  .modal-body { padding: 20px; }
  .detail-section { margin-bottom: 18px; }
  .detail-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a50; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 5px; }
  .detail-value { font-size: 13px; color: #999; line-height: 1.6; }
  .detail-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .detail-chip { padding: 3px 9px; background: #0e0e16; border: 1px solid #1a1a24; border-radius: 100px; font-size: 11px; color: #555; }
  .status-select { background: #0d0d12; border: 1px solid #1a1a24; color: #e2e2e8; padding: 7px 11px; font-size: 12px; font-family: 'Space Mono', monospace; border-radius: 4px; outline: none; cursor: pointer; }
  .divider { height: 1px; background: #0d0d14; margin: 16px 0; }

  /* Success */
  .success { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 60px 20px; text-align: center; }
  .success-icon { font-size: 44px; }
  .success-title { font-size: 20px; font-weight: 600; }
  .success-text { font-size: 13px; color: #444; max-width: 300px; line-height: 1.7; }
  .success-btns { display: flex; gap: 10px; margin-top: 8px; }

  @media (max-width: 500px) { .grid-2 { grid-template-columns: 1fr; } .btn-row { flex-direction: column-reverse; } }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="logo">QUOTR<span>.dev</span></div>
    <div class="header-right" id="header-right"></div>
  </div>
  <div class="main">
    <div id="root"></div>
  </div>
  <div id="modal-root"></div>
</div>

<script>
const AGENTS = [
  { id: "jd", name: "Jordan Dlamini", code: "JD42" },
  { id: "sk", name: "Sarah Kruger", code: "SK77" },
  { id: "mp", name: "Marcus Petersen", code: "MP19" },
  { id: "demo", name: "Demo Agent", code: "DEMO" },
];
const ADMIN_CODE = "ADMIN99";
const STEPS = ["Client Info","Problem","Data Entities","Features","Integrations","Scale","Notes","Assessment"];
const INDUSTRIES = ["Retail / eCommerce","Healthcare / Medical","Finance / Accounting","Legal / Professional Services","Real Estate / Property","Hospitality / Food & Bev","Education / EdTech","Manufacturing / Industrial","Logistics / Transport","Construction / Engineering","NGO / Non-Profit","Other"];
const PROJECT_TYPES = ["Brand new system (greenfield)","Replace an existing system","Add features to existing software","Integrate / automate existing tools","Not sure yet"];
const ENTITY_MAP = {
  "Retail / eCommerce":["Products","Customers","Orders","Inventory","Suppliers","Promotions","Returns","Reviews"],
  "Healthcare / Medical":["Patients","Appointments","Staff","Treatments","Prescriptions","Medical Records","Billing","Referrals"],
  "Finance / Accounting":["Clients","Accounts","Transactions","Invoices","Reports","Compliance Records","Assets"],
  "Legal / Professional Services":["Clients","Cases","Documents","Hearings","Billing","Contracts","Correspondence"],
  "Real Estate / Property":["Properties","Listings","Clients","Agents","Viewings","Offers","Leases","Maintenance"],
  "Hospitality / Food & Bev":["Guests","Bookings","Rooms/Tables","Staff","Menu Items","Events","Reviews","Suppliers"],
  "Education / EdTech":["Students","Courses","Staff","Assignments","Grades","Schedules","Parents","Fees"],
  "Manufacturing / Industrial":["Products","Raw Materials","Production Orders","Suppliers","Staff","Equipment","Quality Records","Shipments"],
  "Logistics / Transport":["Shipments","Routes","Drivers","Vehicles","Clients","Warehouses","Tracking Events","Invoices"],
  "Construction / Engineering":["Projects","Sites","Contractors","Materials","Timesheets","Clients","Inspections","Drawings"],
  "NGO / Non-Profit":["Beneficiaries","Donors","Programs","Staff","Volunteers","Grants","Reports","Events"],
  "Other":["Customers","Products","Orders","Users","Records","Reports","Tasks"],
};
const FEATURES = [
  {id:"auth",label:"User login & role-based access control"},
  {id:"payments",label:"Payment processing (online transactions)"},
  {id:"files",label:"File / document storage & management"},
  {id:"notifications",label:"Automated email / SMS / push notifications"},
  {id:"realtime",label:"Real-time features (live updates, chat)"},
  {id:"reporting",label:"Custom reporting & analytics dashboards"},
  {id:"thirdparty",label:"Third-party API integrations"},
  {id:"workflows",label:"Automated workflows, triggers, or scheduling"},
  {id:"multilang",label:"Multi-language or multi-currency support"},
  {id:"mobile",label:"Native mobile app (iOS / Android)"},
  {id:"geo",label:"Geolocation, mapping, or routing features"},
  {id:"compliance",label:"Regulatory compliance (GDPR, POPIA, HIPAA...)"},
  {id:"publicweb",label:"Public-facing website or storefront"},
  {id:"staffportal",label:"Internal staff portal or back-office tools"},
  {id:"customerportal",label:"Customer self-service portal"},
  {id:"search",label:"Advanced search, filtering, or recommendation"},
  {id:"datamigration",label:"Data migration from existing systems"},
  {id:"ai",label:"AI / ML features (prediction, automation, NLP)"},
];
const INTEGRATIONS = ["Xero / QuickBooks","Sage","Salesforce","HubSpot","Zoho CRM","Shopify","WooCommerce","PayFast","Stripe","PayPal","Google Workspace","Microsoft 365","Slack","WhatsApp Business","Twilio (SMS/Voice)","Mailchimp / Klaviyo","SendGrid","Zapier / Make"];
const USER_VOLS = ["< 50 active users","50–500 users","500–5,000 users","5,000+ users"];
const DATA_VOLS = ["Minimal (thousands of records)","Moderate (tens of thousands)","Large (hundreds of thousands)","Very large (millions+)"];

let state = {
  user: null,
  view: "unlock", // unlock | form | leads | admin
  step: 0,
  submitted: false,
  loading: false,
  assessment: null,
  selectedLead: null,
  codeError: false,
  codeInput: "",
  customEntity: "",
  leads: [],
  form: {
    clientCompany:"",contactName:"",contactEmail:"",contactPhone:"",
    industry:"",companySize:"",
    problemStatement:"",projectType:"",
    entities:[],
    features:[],
    integrations:[],customIntegration:"",
    userRoles:"",monthlyUsers:"",dataVolume:"",
    notes:"",
  }
};

async function loadLeads() {
  try {
    const r = await window.storage.get("quotr_leads");
    if (r) state.leads = JSON.parse(r.value);
  } catch(e) {}
}

async function saveLeads() {
  try { await window.storage.set("quotr_leads", JSON.stringify(state.leads)); } catch(e) {}
}

function update(key, val) { state.form[key] = val; render(); }
function toggleArr(key, val) {
  const arr = state.form[key];
  state.form[key] = arr.includes(val) ? arr.filter(v=>v!==val) : [...arr, val];
  render();
}

function badgeClass(tier) {
  if (!tier) return "badge-Scoping";
  if (tier === "Low") return "badge-Low";
  if (tier === "Medium") return "badge-Medium";
  if (tier === "High") return "badge-High";
  return "badge-Scoping";
}

function canProceed() {
  const f = state.form;
  switch(state.step) {
    case 0: return f.clientCompany && f.contactName && f.contactEmail && f.industry && f.companySize;
    case 1: return f.problemStatement.length > 20 && f.projectType;
    case 2: return f.entities.length >= 2;
    case 5: return f.monthlyUsers && f.dataVolume;
    case 7: return !!state.assessment && !state.loading;
    default: return true;
  }
}

async function runAssessment() {
  state.loading = true; state.assessment = null; render();
  const f = state.form;
  const featLabels = f.features.map(id => { const ft = FEATURES.find(x=>x.id===id); return ft ? ft.label : id; });
  const prompt = `You are a senior software development estimator. Analyse this project brief and respond ONLY with a JSON object (no markdown, no preamble):

CLIENT: ${f.clientCompany} | ${f.companySize} | ${f.industry}
TYPE: ${f.projectType}
PROBLEM: ${f.problemStatement}
DATA ENTITIES (${f.entities.length}): ${f.entities.join(", ")}
PROCESS FEATURES: ${featLabels.join("; ") || "None specified"}
INTEGRATIONS: ${[...f.integrations, f.customIntegration].filter(Boolean).join(", ") || "None"}
USER ROLES: ${f.userRoles || "Unspecified"}
USER VOLUME: ${f.monthlyUsers}
DATA VOLUME: ${f.dataVolume}
NOTES: ${f.notes || "None"}

Respond with ONLY this JSON (no code fences):
{"complexityTier":"Low|Medium|High|Needs Scoping","estimatedHoursMin":0,"estimatedHoursMax":0,"keyDrivers":["..."],"riskFlags":["..."],"scopeNotes":"2-3 sentence summary","needsDeeperScoping":false,"scopingReason":""}

Hour guidance: Low=40-120h, Medium=120-400h, High=400-1000h. If info is ambiguous or scope suggests enterprise complexity, use Needs Scoping.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] })
    });
    const data = await res.json();
    const text = (data.content||[]).map(c=>c.text||"").join("").replace(/```json|```/g,"").trim();
    state.assessment = JSON.parse(text);
  } catch(e) {
    state.assessment = { complexityTier:"Needs Scoping", estimatedHoursMin:0, estimatedHoursMax:0, keyDrivers:[], riskFlags:["Assessment failed — please review manually"], scopeNotes:"Technical issue with the assessment. Please submit and review manually.", needsDeeperScoping:true, scopingReason:"Could not complete automated assessment." };
  }
  state.loading = false; render();
}

async function submitLead() {
  const lead = { id: Date.now().toString(), agentId: state.user.id, agentName: state.user.name, submittedAt: new Date().toISOString(), status: "pending", form: {...state.form, entities:[...state.form.entities], features:[...state.form.features], integrations:[...state.form.integrations]}, assessment: state.assessment ? {...state.assessment, keyDrivers:[...state.assessment.keyDrivers], riskFlags:[...state.assessment.riskFlags]} : null };
  state.leads = [lead, ...state.leads];
  await saveLeads();
  state.submitted = true; render();
}

async function updateStatus(leadId, status) {
  state.leads = state.leads.map(l => l.id===leadId ? {...l,status} : l);
  if (state.selectedLead?.id === leadId) state.selectedLead = {...state.selectedLead, status};
  await saveLeads(); render();
}

function resetForm() {
  state.step=0; state.submitted=false; state.assessment=null; state.view="form";
  state.form={clientCompany:"",contactName:"",contactEmail:"",contactPhone:"",industry:"",companySize:"",problemStatement:"",projectType:"",entities:[],features:[],integrations:[],customIntegration:"",userRoles:"",monthlyUsers:"",dataVolume:"",notes:""};
  render();
}

function renderUnlock() {
  return `<div class="unlock">
    <div class="unlock-logo">QUOTR</div>
    <div class="unlock-sub">Sales scoping tool. Enter your agent code to continue.</div>
    <div>
      <div class="unlock-label">Agent Code</div>
      <div class="unlock-row">
        <input class="unlock-input" id="code-input" value="${state.codeInput}" placeholder="••••" maxlength="10" style="${state.codeError?'border-color:#ff4466':''}">
        <button class="btn btn-primary" onclick="doUnlock()">Enter</button>
      </div>
      ${state.codeError ? '<div class="unlock-error" style="margin-top:8px">Invalid code</div>' : ''}
    </div>
    <div class="unlock-hint">Demo: DEMO &nbsp;|&nbsp; Admin: ADMIN99</div>
  </div>`;
}

function renderLeads() {
  const mine = state.user.isAdmin ? state.leads : state.leads.filter(l=>l.agentId===state.user.id);
  const title = state.user.isAdmin ? "All Submissions" : "My Submissions";
  let cards = mine.length === 0 ? '<div class="leads-empty">No submissions yet.</div>' :
    mine.map(l => {
      const a = l.assessment;
      return `<div class="lead-card" onclick="openLead('${l.id}')">
        <div class="lead-card-top">
          <div>
            <div class="lead-company">${l.form.clientCompany}</div>
            <div class="lead-contact">${l.form.contactName} · ${l.form.contactEmail}</div>
          </div>
          <span class="status-badge status-${l.status}">${l.status}</span>
        </div>
        <div class="lead-meta">
          <div class="lead-meta-item">Industry <span>${l.form.industry}</span></div>
          <div class="lead-meta-item">Tier <span>${a?.complexityTier||'—'}</span></div>
          ${a&&!a.needsDeeperScoping&&a.estimatedHoursMin>0?`<div class="lead-meta-item">Hours <span>${a.estimatedHoursMin}–${a.estimatedHoursMax}h</span></div>`:''}
          ${state.user.isAdmin?`<div class="lead-meta-item">Agent <span>${l.agentName}</span></div>`:''}
        </div>
      </div>`;
    }).join("");
  return `<div class="container">
    <div class="leads-header">
      <div><div class="leads-title">${title}</div><div class="leads-count">${mine.length} record${mine.length!==1?'s':''}</div></div>
      <button class="btn btn-primary btn-sm" onclick="resetForm()">+ New Quote</button>
    </div>
    ${cards}
  </div>`;
}

function renderModal() {
  const l = state.selectedLead;
  if (!l) return '';
  const a = l.assessment;
  const featLabels = (l.form.features||[]).map(id=>{const f=FEATURES.find(x=>x.id===id);return f?f.label:id;});
  const integList = [...(l.form.integrations||[]), l.form.customIntegration].filter(Boolean);
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">${l.form.clientCompany}</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="detail-section">
          <div class="detail-label">Status</div>
          ${state.user.isAdmin
            ? `<select class="status-select" onchange="updateStatus('${l.id}',this.value)"><option value="pending" ${l.status==='pending'?'selected':''}>Pending</option><option value="reviewed" ${l.status==='reviewed'?'selected':''}>Reviewed</option><option value="quoted" ${l.status==='quoted'?'selected':''}>Quoted</option><option value="declined" ${l.status==='declined'?'selected':''}>Declined</option></select>`
            : `<span class="status-badge status-${l.status}">${l.status}</span>`}
        </div>
        <div class="divider"></div>
        <div class="detail-section"><div class="detail-label">Contact</div><div class="detail-value">${l.form.contactName} — ${l.form.contactEmail}${l.form.contactPhone?' · '+l.form.contactPhone:''}</div></div>
        <div class="detail-section"><div class="detail-label">Company</div><div class="detail-value">${l.form.clientCompany} · ${l.form.companySize} · ${l.form.industry}</div></div>
        <div class="detail-section"><div class="detail-label">Problem Statement</div><div class="detail-value">${l.form.problemStatement}</div></div>
        <div class="detail-section"><div class="detail-label">Project Type</div><div class="detail-value">${l.form.projectType}</div></div>
        <div class="divider"></div>
        <div class="detail-section"><div class="detail-label">Data Entities</div><div class="detail-chips">${(l.form.entities||[]).map(e=>`<span class="detail-chip">${e}</span>`).join('')}</div></div>
        ${featLabels.length?`<div class="detail-section"><div class="detail-label">Features</div><div class="detail-chips">${featLabels.map(f=>`<span class="detail-chip">${f}</span>`).join('')}</div></div>`:''}
        ${integList.length?`<div class="detail-section"><div class="detail-label">Integrations</div><div class="detail-chips">${integList.map(i=>`<span class="detail-chip">${i}</span>`).join('')}</div></div>`:''}
        ${l.form.userRoles?`<div class="detail-section"><div class="detail-label">User Roles</div><div class="detail-value">${l.form.userRoles}</div></div>`:''}
        <div class="detail-section"><div class="detail-label">Scale</div><div class="detail-value">${l.form.monthlyUsers} · ${l.form.dataVolume}</div></div>
        ${l.form.notes?`<div class="detail-section"><div class="detail-label">Notes</div><div class="detail-value">${l.form.notes}</div></div>`:''}
        ${a ? `<div class="divider"></div>
        <div class="assess-section-title" style="margin-bottom:12px">AI Assessment</div>
        ${a.needsDeeperScoping?`<div class="scoping-alert"><div class="scoping-alert-title">⚠ Deeper Scoping Required</div><div class="scoping-alert-text">${a.scopingReason}</div></div>`:''}
        <div style="display:flex;gap:20px;align-items:flex-start;margin-bottom:14px">
          <span class="complexity-badge ${badgeClass(a.complexityTier)}">${a.complexityTier}</span>
          ${!a.needsDeeperScoping&&a.estimatedHoursMin>0?`<div><div style="font-size:22px;font-weight:700;font-family:'Space Mono',monospace">${a.estimatedHoursMin}–${a.estimatedHoursMax}h</div><div style="font-size:10px;color:#3a3a50;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:0.1em">Est. hours</div></div>`:''}
        </div>
        <div class="assess-section"><div class="assess-section-title">Summary</div><div class="assess-narrative">${a.scopeNotes}</div></div>
        ${a.keyDrivers&&a.keyDrivers.length?`<div class="assess-section"><div class="assess-section-title">Complexity Drivers</div><ul class="assess-list">${a.keyDrivers.map(d=>`<li class="assess-item"><div class="assess-dot dot-green"></div><div class="assess-item-text">${d}</div></li>`).join('')}</ul></div>`:''}
        ${a.riskFlags&&a.riskFlags.length?`<div class="assess-section"><div class="assess-section-title">Risk Flags</div><ul class="assess-list">${a.riskFlags.map(r=>`<li class="assess-item"><div class="assess-dot dot-orange"></div><div class="assess-item-text">${r}</div></li>`).join('')}</ul></div>`:''}
        ` : ''}
        <div style="font-size:10px;color:#1e1e2a;font-family:'Space Mono',monospace;margin-top:16px">Submitted ${new Date(l.submittedAt).toLocaleString()} by ${l.agentName}</div>
      </div>
    </div>
  </div>`;
}

function renderStep() {
  if (state.submitted) {
    return `<div class="container"><div class="success">
      <div class="success-icon">✓</div>
      <div class="success-title">Lead Submitted</div>
      <div class="success-text">${state.form.clientCompany}'s quote request has been logged. You'll be notified once the admin reviews.</div>
      <div class="success-btns">
        <button class="btn btn-primary" onclick="resetForm()">New Quote</button>
        <button class="btn btn-ghost" onclick="state.view='leads';state.submitted=false;render()">View My Leads</button>
      </div>
    </div></div>`;
  }

  const pct = Math.round((state.step / STEPS.length) * 100);
  const f = state.form;
  const suggestions = (ENTITY_MAP[f.industry] || ENTITY_MAP["Other"]);

  let stepContent = '';
  
  if (state.step === 0) {
    stepContent = `
      <div class="step-eyebrow">Step 01 — Client Info</div>
      <div class="step-title">Who are we talking to?</div>
      <div class="step-desc">Get the client's details on record for follow-up.</div>
      <div class="grid-2">
        <div class="field"><label class="field-label">Company Name *</label><input class="field-input" value="${f.clientCompany}" oninput="update('clientCompany',this.value)" placeholder="Acme Corp"></div>
        <div class="field"><label class="field-label">Contact Person *</label><input class="field-input" value="${f.contactName}" oninput="update('contactName',this.value)" placeholder="Jane Smith"></div>
      </div>
      <div class="grid-2">
        <div class="field"><label class="field-label">Email *</label><input class="field-input" type="email" value="${f.contactEmail}" oninput="update('contactEmail',this.value)" placeholder="jane@acme.com"></div>
        <div class="field"><label class="field-label">Phone</label><input class="field-input" type="tel" value="${f.contactPhone}" oninput="update('contactPhone',this.value)" placeholder="+27 82 000 0000"></div>
      </div>
      <div class="grid-2">
        <div class="field"><label class="field-label">Industry *</label><select class="field-select" onchange="update('industry',this.value);state.form.entities=[];render()"><option value="">Select industry</option>${INDUSTRIES.map(i=>`<option value="${i}" ${f.industry===i?'selected':''}>${i}</option>`).join('')}</select></div>
        <div class="field"><label class="field-label">Company Size *</label><select class="field-select" onchange="update('companySize',this.value)"><option value="">Select size</option>${["1–10 employees","11–50 employees","51–200 employees","201–1,000 employees"].map(s=>`<option value="${s}" ${f.companySize===s?'selected':''}>${s}</option>`).join('')}</select></div>
      </div>`;
  }

  if (state.step === 1) {
    stepContent = `
      <div class="step-eyebrow">Step 02 — The Problem</div>
      <div class="step-title">What are they trying to fix?</div>
      <div class="step-desc">Get them to describe the problem in plain language. Don't lead with solutions — capture what's broken, manual, or missing. The more specific, the better.</div>
      <div class="field"><label class="field-label">Problem Statement *</label><textarea class="field-textarea" style="min-height:110px" oninput="update('problemStatement',this.value)" placeholder="e.g. We're tracking 300 rental properties across 3 people using spreadsheets. We lose track of maintenance requests and lease renewals. There's no way to see which units are vacant without calling everyone...">${f.problemStatement}</textarea></div>
      <div class="field"><label class="field-label">Project Type *</label><div class="chips">${PROJECT_TYPES.map(t=>`<div class="chip ${f.projectType===t?'on':''}" onclick="update('projectType','${t}')">${t}</div>`).join('')}</div></div>`;
  }

  if (state.step === 2) {
    const custom = f.entities.filter(e=>!suggestions.includes(e));
    stepContent = `
      <div class="step-eyebrow">Step 03 — Data Entities</div>
      <div class="step-title">What does this system track?</div>
      <div class="step-desc">These are the core "things" the system stores — people, records, objects, events. This is the <strong style="color:#888">primary complexity driver</strong>. Select everything and add anything missing. Minimum 2.</div>
      <div class="chips">${suggestions.map(e=>`<div class="chip ${f.entities.includes(e)?'on':''}" onclick="toggleArr('entities','${e}')">${e}</div>`).join('')}</div>
      ${custom.length?`<div class="chips" style="margin-top:8px">${custom.map(e=>`<div class="chip on" onclick="toggleArr('entities','${e}')">${e} ×</div>`).join('')}</div>`:''}
      <div class="chip-input-row">
        <input class="chip-input" id="entity-input" value="${state.customEntity}" oninput="state.customEntity=this.value" onkeydown="if(event.key==='Enter')addEntity()" placeholder="Add custom entity...">
        <button class="chip-add-btn" onclick="addEntity()">+ Add</button>
      </div>
      ${f.entities.length?`<div style="margin-top:10px;font-size:10px;color:#3a3a50;font-family:'Space Mono',monospace">${f.entities.length} entit${f.entities.length===1?'y':'ies'} selected</div>`:''}`;
  }

  if (state.step === 3) {
    stepContent = `
      <div class="step-eyebrow">Step 04 — Process Features</div>
      <div class="step-title">What does it need to do?</div>
      <div class="step-desc">Select every capability required. Each one adds real development time — don't skip anything even if the client is unsure.</div>
      <div class="features">${FEATURES.map(f2=>`<div class="feat ${f.features.includes(f2.id)?'on':''}" onclick="toggleArr('features','${f2.id}')"><div class="feat-box">${f.features.includes(f2.id)?'<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div><div class="feat-text">${f2.label}</div></div>`).join('')}</div>`;
  }

  if (state.step === 4) {
    stepContent = `
      <div class="step-eyebrow">Step 05 — Integrations</div>
      <div class="step-title">What do they already use?</div>
      <div class="step-desc">Every integration adds scope. Ask: "What accounting software? Any CRM? How do you process payments? Do you use anything for communication?"</div>
      <div class="chips">${INTEGRATIONS.map(i=>`<div class="chip ${f.integrations.includes(i)?'on':''}" onclick="toggleArr('integrations','${i}')">${i}</div>`).join('')}</div>
      <div class="field" style="margin-top:18px"><label class="field-label">Other integrations not listed</label><input class="field-input" value="${f.customIntegration}" oninput="update('customIntegration',this.value)" placeholder="e.g. Custom ERP, proprietary legacy system..."></div>`;
  }

  if (state.step === 5) {
    stepContent = `
      <div class="step-eyebrow">Step 06 — Scale & Volume</div>
      <div class="step-title">How big does this need to be?</div>
      <div class="step-desc">Scale assumptions drive architecture decisions. A system for 50 users is built very differently to one for 5,000.</div>
      <div class="field"><label class="field-label">User roles / types</label><input class="field-input" value="${f.userRoles}" oninput="update('userRoles',this.value)" placeholder="e.g. Admin, Technician, Client, Finance Manager"></div>
      <div class="field"><label class="field-label">Expected active users per month *</label><div class="chips" style="margin-top:4px">${USER_VOLS.map(v=>`<div class="chip ${f.monthlyUsers===v?'on':''}" onclick="update('monthlyUsers','${v}')">${v}</div>`).join('')}</div></div>
      <div class="field"><label class="field-label">Data volume expectation *</label><div class="chips" style="margin-top:4px">${DATA_VOLS.map(v=>`<div class="chip ${f.dataVolume===v?'on':''}" onclick="update('dataVolume','${v}')">${v}</div>`).join('')}</div></div>`;
  }

  if (state.step === 6) {
    stepContent = `
      <div class="step-eyebrow">Step 07 — Anything Else</div>
      <div class="step-title">Capture everything unusual.</div>
      <div class="step-desc">Hard deadlines, existing codebases, budget signals, compliance needs, decision timeline, or anything that changes the scope picture.</div>
      <div class="field"><label class="field-label">Additional Notes</label><textarea class="field-textarea" style="min-height:130px" oninput="update('notes',this.value)" placeholder="e.g. They need this live in 8 weeks for a product launch. They have an existing React frontend they want to keep. Budget signal: ~R150k. Decision by end of month. They mentioned POPIA compliance is a hard requirement.">${f.notes}</textarea></div>`;
  }

  if (state.step === 7) {
    const a = state.assessment;
    stepContent = `
      <div class="step-eyebrow">Step 08 — Complexity Assessment</div>
      <div class="step-title">Get the AI read on this scope.</div>
      <div class="step-desc">Analyses data complexity and process depth to estimate development hours. This is for the developer's review — not a final price. Apply your rate to the hours.</div>
      ${!a && !state.loading ? `<div style="text-align:center;padding:40px 0"><button class="btn btn-primary" onclick="runAssessment()" style="padding:14px 32px">Run Assessment ↗</button></div>` : ''}
      ${state.loading ? `<div class="loader"><div class="loader-ring"></div><div class="loader-text">Analysing scope...</div></div>` : ''}
      ${a && !state.loading ? `<div class="assessment-card">
        <div class="assessment-top">
          <span class="complexity-badge ${badgeClass(a.complexityTier)}">${a.complexityTier}</span>
          ${!a.needsDeeperScoping&&a.estimatedHoursMin>0?`<div><div class="hours-display">${a.estimatedHoursMin}–${a.estimatedHoursMax}h</div><div class="hours-label">Estimated development hours</div></div>`:''}
        </div>
        <div class="assessment-body">
          ${a.needsDeeperScoping?`<div class="scoping-alert"><div class="scoping-alert-title">⚠ Deeper Scoping Required</div><div class="scoping-alert-text">${a.scopingReason}</div></div>`:''}
          <div class="assess-section"><div class="assess-section-title">Summary</div><div class="assess-narrative">${a.scopeNotes}</div></div>
          ${a.keyDrivers&&a.keyDrivers.length?`<div class="assess-section"><div class="assess-section-title">Complexity Drivers</div><ul class="assess-list">${a.keyDrivers.map(d=>`<li class="assess-item"><div class="assess-dot dot-green"></div><div class="assess-item-text">${d}</div></li>`).join('')}</ul></div>`:''}
          ${a.riskFlags&&a.riskFlags.length?`<div class="assess-section"><div class="assess-section-title">Risk Flags</div><ul class="assess-list">${a.riskFlags.map(r=>`<li class="assess-item"><div class="assess-dot dot-orange"></div><div class="assess-item-text">${r}</div></li>`).join('')}</ul></div>`:''}
          <div style="margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="runAssessment()">Re-run</button></div>
        </div>
      </div>` : ''}`;
  }

  const can = canProceed();
  return `<div class="container">
    <div class="progress">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-meta">
        <div class="progress-step-label">Step ${state.step+1} of ${STEPS.length} · ${STEPS[state.step]}</div>
        <div class="progress-pct">${pct}%</div>
      </div>
    </div>
    ${stepContent}
    <div class="btn-row">
      ${state.step>0?`<button class="btn btn-ghost" onclick="state.step--;render()">← Back</button>`:''}
      ${state.step<STEPS.length-1?`<button class="btn btn-primary" onclick="state.step++;render()" ${!can?'disabled':''}>Continue →</button>`:''}
      ${state.step===STEPS.length-1&&state.assessment?`<button class="btn btn-primary" onclick="submitLead()">Submit Lead ✓</button>`:''}
    </div>
  </div>`;
}

function renderHeader() {
  if (!state.user) { document.getElementById("header-right").innerHTML = ''; return; }
  const myCount = state.user.isAdmin ? state.leads.length : state.leads.filter(l=>l.agentId===state.user.id).length;
  document.getElementById("header-right").innerHTML = `
    <span class="agent-pill">${state.user.name}</span>
    <button class="nav-btn ${state.view==='form'&&!state.submitted?'active':''}" onclick="resetForm()">New Quote</button>
    ${!state.user.isAdmin?`<button class="nav-btn ${state.view==='leads'?'active':''}" onclick="state.view='leads';render()">My Leads${myCount>0?' ('+myCount+')':''}</button>`:''}
    ${state.user.isAdmin?`<button class="nav-btn ${state.view==='admin'?'active':''}" onclick="state.view='admin';render()">Dashboard (${myCount})</button>`:''}
    <button class="nav-btn" onclick="state.user=null;state.view='unlock';render()">Sign Out</button>`;
}

function render() {
  renderHeader();
  let html = '';
  if (state.view === 'unlock') html = renderUnlock();
  else if (state.view === 'form') html = renderStep();
  else html = renderLeads();
  document.getElementById("root").innerHTML = html;
  document.getElementById("modal-root").innerHTML = state.selectedLead ? renderModal() : '';
  // restore focus if code input
  const ci = document.getElementById("code-input");
  if (ci) { ci.focus(); ci.setSelectionRange(ci.value.length,ci.value.length); }
}

// Global handlers
window.doUnlock = function() {
  const input = document.getElementById("code-input");
  const code = (input?input.value:state.codeInput).trim().toUpperCase();
  state.codeInput = code;
  if (code === ADMIN_CODE) { state.user = {id:"admin",name:"Admin",isAdmin:true}; state.view="admin"; render(); return; }
  const agent = AGENTS.find(a=>a.code===code);
  if (agent) { state.user=agent; state.view="form"; render(); return; }
  state.codeError = true; render();
  setTimeout(()=>{state.codeError=false;render();}, 2000);
};
window.update = update;
window.toggleArr = toggleArr;
window.runAssessment = runAssessment;
window.submitLead = submitLead;
window.resetForm = resetForm;
window.updateStatus = updateStatus;
window.addEntity = function() {
  const val = state.customEntity.trim();
  if (!val) return;
  if (!state.form.entities.includes(val)) state.form.entities.push(val);
  state.customEntity = ""; render();
};
window.openLead = function(id) { state.selectedLead = state.leads.find(l=>l.id===id)||null; render(); };
window.closeModal = function() { state.selectedLead=null; render(); };

// Boot
loadLeads().then(()=>render());
</script>
</body>
</html>
