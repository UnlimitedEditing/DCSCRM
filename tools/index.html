  .nav-btn { padding: 4px 12px; font-size: 10px; font-family: 'Space Mono', monospace; background: transparent; border: 1px solid #1a1a24; color: #444; border-radius: 3px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.06em; }

  .nav-btn.active { border-color: #b8ff2030; color: #b8ff20; background: #b8ff2008; }

  .container { max-width: 640px; margin: 0 auto; }

  .unlock { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 28px; }
  .unlock-logo { font-family: 'Space Mono', monospace; font-size: 32px; font-weight: 700; color: #b8ff20; letter-spacing: -0.03em; }
  .unlock-sub { font-size: 13px; color: #3a3a4a; text-align: center; max-width: 280px; line-height: 1.7; }
  .unlock-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a4a; text-transform: uppercase; letter-spacing: 0.12em; text-align: center; margin-bottom: 8px; }
  .unlock-row { display: flex; gap: 8px; }
  .unlock-input { background: #0d0d12; border: 1px solid #1a1a24; color: #e2e2e8; padding: 11px 16px; font-size: 15px; font-family: 'Space Mono', monospace; border-radius: 4px; outline: none; width: 180px; letter-spacing: 0.25em; text-align: center; text-transform: uppercase; transition: border-color 0.2s; }
  .unlock-input:focus { border-color: #b8ff2060; }
  .unlock-error { font-size: 11px; color: #ff4466; font-family: 'Space Mono', monospace; text-align: center; }
  .unlock-hint { font-size: 11px; color: #2a2a38; text-align: center; font-family: 'Space Mono', monospace; }

  /* ── Progress ── */
  .progress { margin-bottom: 40px; }
  .progress-track { height: 1px; background: #12121c; margin-bottom: 12px; }
  .progress-fill { height: 100%; background: #b8ff20; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }
  .progress-meta { display: flex; justify-content: space-between; }
  .progress-step-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #333; text-transform: uppercase; letter-spacing: 0.1em; }
  .progress-pct { font-family: 'Space Mono', monospace; font-size: 10px; color: #b8ff20; }

  .step-title { font-size: 20px; font-weight: 600; color: #e8e8f0; margin-bottom: 6px; line-height: 1.25; }
  .step-desc { font-size: 13px; color: #4a4a60; line-height: 1.65; margin-bottom: 28px; }

  .field-input, .field-select, .field-textarea { width: 100%; background: #0d0d12; border: 1px solid #1a1a24; color: #e2e2e8; padding: 10px 13px; font-size: 13px; font-family: 'Sora', sans-serif; border-radius: 4px; outline: none; transition: border-color 0.2s; }

  .field-select option { background: #0d0d12; }

  .chip-input { flex: 1; background: #0d0d12; border: 1px solid #1a1a24; color: #e2e2e8; padding: 8px 12px; font-size: 12px; font-family: 'Sora', sans-serif; border-radius: 4px; outline: none; }

  .feat:hover { border-color: #1a1a26; background: #0d0d14; }
  .feat.on { border-color: #b8ff2018; background: #b8ff2005; }
  .feat-box { width: 15px; height: 15px; border: 1px solid #252530; border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .feat.on .feat-box { background: #b8ff20; border-color: #b8ff20; }
  .feat-text { font-size: 12px; color: #666; }

  .btn { padding: 11px 22px; font-size: 11px; font-family: 'Space Mono', monospace; font-weight: 700; letter-spacing: 0.07em; border-radius: 4px; cursor: pointer; transition: all 0.15s; border: none; text-transform: uppercase; }
  .btn-primary { background: #b8ff20; color: #000; }

  .btn-ghost { background: transparent; color: #444; border: 1px solid #1a1a24; }

  .btn-sm { padding: 7px 14px; font-size: 10px; }

  .badge-Scoping  { background: #ff446615; color: #ff4466; border: 1px solid #ff446630; }
  .hours-display { font-size: 32px; font-weight: 700; color: #e8e8f0; font-family: 'Space Mono', monospace; }
  .hours-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a50; text-transform: uppercase; letter-spacing: 0.12em; margin-top: 4px; }
  .assessment-body { padding: 20px; }
  .assess-section { margin-bottom: 20px; }
  .assess-section-title { font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a50; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
  .assess-narrative { font-size: 13px; color: #777; line-height: 1.7; }
  .assess-list { list-style: none; }
  .assess-item { display: flex; gap: 9px; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid #0d0d12; }
  .assess-item:last-child { border-bottom: none; }
  .assess-dot { width: 5px; height: 5px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }

  .dot-orange { background: #ff8800; }
  .assess-item-text { font-size: 12px; color: #777; line-height: 1.5; }

  .leads-title { font-size: 17px; font-weight: 600; }
  .leads-count { font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a50; margin-top: 2px; }
  .leads-empty { text-align: center; padding: 60px 20px; color: #2a2a38; font-size: 13px; }

  .lead-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .lead-company { font-weight: 600; font-size: 14px; }
  .lead-contact { font-size: 11px; color: #444; margin-top: 2px; }
  .lead-meta { display: flex; gap: 14px; flex-wrap: wrap; }
  .lead-meta-item { font-family: 'Space Mono', monospace; font-size: 10px; color: #2a2a3a; }
  .lead-meta-item span { color: #555; }
  .status-badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
  .status-pending  { background: #ffcc0010; color: #ffcc00; border: 1px solid #ffcc0022; }
  .status-reviewed { background: #00aaff10; color: #00aaff; border: 1px solid #00aaff22; }
  .status-quoted   { background: #b8ff2010; color: #b8ff20; border: 1px solid #b8ff2022; }
  .status-declined { background: #ff446610; color: #ff4466; border: 1px solid #ff446622; }

  /* ── Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: #000000cc; backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-start; justify-content: center; padding: 20px; overflow-y: auto; }
  .modal { background: #09090e; border: 1px solid #1a1a24; border-radius: 8px; width: 100%; max-width: 600px; margin: auto; }
  .modal-header { padding: 18px 20px; border-bottom: 1px solid #10101a; display: flex; justify-content: space-between; align-items: center; }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-close { background: none; border: none; color: #333; font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; }
  .modal-close:hover { color: #777; }
  .modal-body { padding: 20px; }
  .detail-section { margin-bottom: 18px; }
  .detail-label { font-family: 'Space Mono', monospace; font-size: 10px; color: #3a3a50; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 5px; }
  .detail-value { font-size: 13px; color: #999; line-height: 1.6; }
  .detail-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .detail-chip { padding: 3px 9px; background: #0e0e16; border: 1px solid #1a1a24; border-radius: 100px; font-size: 11px; color: #555; }
  .status-select { background: #0d0d12; border: 1px solid #1a1a24; color: #e2e2e8; padding: 7px 11px; font-size: 12px; font-family: 'Space Mono', monospace; border-radius: 4px; outline: none; cursor: pointer; }
  .divider { height: 1px; background: #0d0d14; margin: 16px 0; }

  /* ── Success ── */
  .success { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 60px 20px; text-align: center; }
  .success-icon { font-size: 44px; }
  .success-title { font-size: 20px; font-weight: 600; }
  .success-text { font-size: 13px; color: #444; max-width: 300px; line-height: 1.7; }
  .success-btns { display: flex; gap: 10px; margin-top: 8px; }

  @media (max-width: 500px) {
    .grid-2 { grid-template-columns: 1fr; }
    .btn-row { flex-direction: column-reverse; }
  }
</style>
</head>

function rowToLead(r) {
  return {
    id:          r.id,
    agentId:     r.agent_id,
    agentName:   r.agent_name,
    submittedAt: r.submitted_at,
    status:      r.status,
    form: {

      contactPhone:      r.contact_phone     || '',

      problemStatement:  r.problem_statement || '',
      projectType:       r.project_type      || '',
      entities:          r.entities          || [],
      features:          r.features          || [],
      integrations:      r.integrations      || [],
      customIntegration: r.custom_integration || '',
      userRoles:         r.user_roles        || '',
      monthlyUsers:      r.monthly_users     || '',
      dataVolume:        r.data_volume       || '',
      notes:             r.notes             || '',
    },
    assessment: r.complexity_tier ? {
      complexityTier:    r.complexity_tier,
      estimatedHoursMin: r.estimated_hours_min,
      estimatedHoursMax: r.estimated_hours_max,
      keyDrivers:        r.key_drivers        || [],

      needsDeeperScoping:r.needs_deeper_scoping || false,

  };

    client_company:    f.clientCompany,
    contact_name:      f.contactName,

async function loadLeads() {
  try {
    const { data, error } = await db.from('leads').select('*').order('submitted_at', { ascending: false });
    if (error) throw error;
    state.leads = (data || []).map(rowToLead);
  } catch(e) {
    console.warn('Supabase load failed, using localStorage:', e);
    try { const raw = localStorage.getItem('quotr_leads'); if (raw) state.leads = JSON.parse(raw); } catch(_) {}
  }

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function update(key, val)    { state.form[key] = val; render(); }
function toggleArr(key, val) {
  const arr = state.form[key];
  state.form[key] = arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val];
  render();
}

function badgeClass(tier) {
  if (tier === "Low")    return "badge-Low";
  if (tier === "Medium") return "badge-Medium";
  if (tier === "High")   return "badge-High";
  return "badge-Scoping";
}

function canProceed() {
  const f = state.form;
  switch (state.step) {
    case 0: return f.clientCompany && f.contactName && f.contactEmail && f.industry && f.companySize;
    case 1: return f.problemStatement.length > 20 && f.projectType;
    case 2: return f.entities.length >= 2;
    case 5: return f.monthlyUsers && f.dataVolume;
    case 7: return !!state.assessment && !state.loading;
    default: return true;
  }
}

function emptyForm() {
  return {
    clientCompany: "", contactName: "", contactEmail: "", contactPhone: "",
    industry: "", companySize: "",
    problemStatement: "", projectType: "",
    entities: [], features: [], integrations: [], customIntegration: "",
    userRoles: "", monthlyUsers: "", dataVolume: "",
    notes: "",
  };
}

// ─── ASSESSMENT ───────────────────────────────────────────────────────────────
async function runAssessment() {
  state.loading = true; state.assessment = null; render();
  const f = state.form;
  const featLabels = f.features.map(id => {
    const ft = FEATURES.find(x => x.id === id); return ft ? ft.label : id;
  });

  const prompt = `You are a senior software development estimator. Analyse this project brief and respond ONLY with a JSON object (no markdown, no preamble):

CLIENT: ${f.clientCompany} | ${f.companySize} | ${f.industry}
TYPE: ${f.projectType}
PROBLEM: ${f.problemStatement}
DATA ENTITIES (${f.entities.length}): ${f.entities.join(", ")}
PROCESS FEATURES: ${featLabels.join("; ") || "None specified"}
INTEGRATIONS: ${[...f.integrations, f.customIntegration].filter(Boolean).join(", ") || "None"}
USER ROLES: ${f.userRoles || "Unspecified"}
USER VOLUME: ${f.monthlyUsers}
DATA VOLUME: ${f.dataVolume}
NOTES: ${f.notes || "None"}

Respond with ONLY this JSON (no code fences):
{"complexityTier":"Low|Medium|High|Needs Scoping","estimatedHoursMin":0,"estimatedHoursMax":0,"keyDrivers":["..."],"riskFlags":["..."],"scopeNotes":"2-3 sentence summary","needsDeeperScoping":false,"scopingReason":""}

Hour bands: Low=40-120h, Medium=120-400h, High=400-1000h. Use Needs Scoping if scope is ambiguous or enterprise-leaning.`;

  try {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${OPENROUTER_KEY}`,
        "HTTP-Referer": window.location.origin,
      },
      body: JSON.stringify({
        model: "meta-llama/llama-3.3-70b-instruct:free",
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.choices[0].message.content.replace(/```json|```/g, "").trim();
    state.assessment = JSON.parse(text);
  } catch(e) {
    state.assessment = {
      complexityTier: "Needs Scoping", estimatedHoursMin: 0, estimatedHoursMax: 0,
      keyDrivers: [], riskFlags: ["Assessment failed — please review manually"],
      scopeNotes: "Technical issue with the assessment. Please submit and review manually.",
      needsDeeperScoping: true, scopingReason: "Could not complete automated assessment."
    };
  }
  state.loading = false; render();
}

// ─── LEAD SUBMIT ──────────────────────────────────────────────────────────────
async function submitLead() {
  const lead = {
    agentId:     state.user.id,
    agentName:   state.user.name,
    submittedAt: new Date().toISOString(),
    status:      "pending",
    form: {
      ...state.form,
      entities:     [...state.form.entities],
      features:     [...state.form.features],
      integrations: [...state.form.integrations],
    },
    assessment: state.assessment ? {
      ...state.assessment,
      keyDrivers: [...state.assessment.keyDrivers],
      riskFlags:  [...state.assessment.riskFlags],
    } : null,
  };

  // Save to Supabase — let the DB generate the UUID, then capture it
  try {
    const { data, error } = await db.from('leads').insert(leadToRow(lead)).select('id').single();
    if (error) throw error;
    lead.id = data.id;
  } catch(e) {
    console.warn('Supabase insert failed, using localStorage fallback:', e);
    lead.id = Date.now().toString();
    try { localStorage.setItem('quotr_leads', JSON.stringify([lead, ...state.leads])); } catch(_) {}
  }

  state.leads = [lead, ...state.leads];

  // Discord notification (fire-and-forget — errors won't block the UI)
  notifyDiscord(lead).catch(err => console.warn('Discord notify failed:', err));

  state.submitted = true; render();
}

async function updateStatus(leadId, status) {
  const lead     = state.leads.find(l => l.id === leadId);
  const fromStatus = lead?.status || 'pending';

  state.leads = state.leads.map(l => l.id === leadId ? { ...l, status } : l);
  if (state.selectedLead?.id === leadId) state.selectedLead = { ...state.selectedLead, status };

  try {
    const { error } = await db.from('leads').update({ status }).eq('id', leadId);
    if (error) throw error;
    // Write audit row to status history
    await db.from('lead_status_history').insert({
      lead_id:    leadId,
      from_status: fromStatus,
      to_status:  status,
      changed_by: state.user?.id || 'admin',
    });
  } catch(e) {
    console.warn('Supabase updateStatus failed:', e);
    try { localStorage.setItem('quotr_leads', JSON.stringify(state.leads)); } catch(_) {}
  }

  // Discord status-change notification
  if (lead) notifyStatusChange(lead, fromStatus, status).catch(() => {});

  render();
}

function resetForm() {
  state.step = 0; state.submitted = false; state.assessment = null;
  state.form = emptyForm(); state.view = "form"; render();
}

// ─── DISCORD NOTIFIERS ────────────────────────────────────────────────────────
async function notifyDiscord(lead) {
  const a = lead.assessment;
  const tierColour = { Low: 0x79cc14, Medium: 0xffcc00, High: 0xff8800, "Needs Scoping": 0xff4466 };
  const colour = tierColour[a?.complexityTier] ?? 0x888888;
  const fields = [
    { name: "Company",      value: lead.form.clientCompany || "—", inline: true },
    { name: "Contact",      value: lead.form.contactName   || "—", inline: true },
    { name: "Email",        value: lead.form.contactEmail  || "—", inline: true },
    { name: "Industry",     value: lead.form.industry      || "—", inline: true },
    { name: "Size",         value: lead.form.companySize   || "—", inline: true },
    { name: "Project Type", value: lead.form.projectType   || "—", inline: true },
  ];
  if (a) {
    fields.push({ name: "Complexity", value: a.complexityTier || "—", inline: true });
    if (!a.needsDeeperScoping && a.estimatedHoursMin > 0)
      fields.push({ name: "Est. Hours", value: `${a.estimatedHoursMin}–${a.estimatedHoursMax}h`, inline: true });
    if (a.scopeNotes)
      fields.push({ name: "Summary", value: a.scopeNotes, inline: false });
    if (a.riskFlags?.length)
      fields.push({ name: "⚠ Risk Flags", value: a.riskFlags.map(r => `• ${r}`).join("\n"), inline: false });
  }
  if (lead.form.notes) fields.push({ name: "Agent Notes", value: lead.form.notes, inline: false });
  await fetch(DISCORD_WEBHOOK, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: "DCS Quotr",
      embeds: [{
        title: `📥 New Lead — ${lead.form.clientCompany}`,
        description: lead.form.problemStatement
          ? `> ${lead.form.problemStatement.slice(0, 280)}${lead.form.problemStatement.length > 280 ? "…" : ""}`
          : "No problem statement captured.",
        color: colour, fields,
        footer: { text: `${lead.agentName} · ${new Date(lead.submittedAt).toLocaleString("en-ZA")}` },
        timestamp: lead.submittedAt,
      }]
    })
  });
}

async function notifyStatusChange(lead, fromStatus, toStatus) {
  const emoji = { pending: "🕐", reviewed: "👀", quoted: "💰", declined: "❌", won: "🏆", lost: "🪦" };
  await fetch(DISCORD_WEBHOOK, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      username: "DCS Quotr",
      embeds: [{
        title: `${emoji[toStatus] ?? "🔄"} Status Update — ${lead.form.clientCompany}`,
        description: `**${fromStatus}** → **${toStatus}**`,
        color: toStatus === "won" ? 0x79cc14 : (toStatus === "declined" || toStatus === "lost") ? 0xff4466 : 0x1c6eff,
        fields: [
          { name: "Agent",      value: lead.agentName || "—", inline: true },
          { name: "Changed by", value: state.user?.name || "Admin", inline: true },
        ],
        timestamp: new Date().toISOString(),
      }]
    })
  });
}

  if (state.step === 3) stepContent = `
    <div class="step-eyebrow">Step 04 — Process Features</div>
    <div class="step-title">What does it need to do?</div>
    <div class="step-desc">Select every capability required. Each one adds real development time — don't skip
      anything even if the client is unsure.</div>
    <div class="features">
      ${FEATURES.map(f2 => `
        <div class="feat ${f.features.includes(f2.id)?'on':''}" onclick="toggleArr('features','${f2.id}')">
          <div class="feat-box">${f.features.includes(f2.id)
            ? '<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
            : ''}</div>
          <div class="feat-text">${f2.label}</div>
        </div>`).join('')}
    </div>`;

  // ── Step 4: Integrations ───────────────────────────────────────────────────
  if (state.step === 4) stepContent = `
    <div class="step-eyebrow">Step 05 — Integrations</div>
    <div class="step-title">What do they already use?</div>
    <div class="step-desc">Every integration adds scope. Ask: "What accounting software? Any CRM?
      How do you process payments? What do you use for communication?"</div>
    <div class="chips">
      ${INTEGRATIONS.map(i => `<div class="chip ${f.integrations.includes(i)?'on':''}" onclick="toggleArr('integrations','${i}')">${i}</div>`).join('')}
    </div>
    <div class="field" style="margin-top:18px"><label class="field-label">Other integrations not listed</label>
      <input class="field-input" value="${f.customIntegration}"
        oninput="update('customIntegration',this.value)"
        placeholder="e.g. Custom ERP, proprietary legacy system..."></div>`;

  // ── Step 5: Scale ──────────────────────────────────────────────────────────
  if (state.step === 5) stepContent = `
    <div class="step-eyebrow">Step 06 — Scale & Volume</div>
    <div class="step-title">How big does this need to be?</div>
    <div class="step-desc">Scale assumptions drive architecture decisions. A system for 50 users
      is built very differently to one for 5,000.</div>
    <div class="field"><label class="field-label">User roles / types</label>
      <input class="field-input" value="${f.userRoles}" oninput="update('userRoles',this.value)"
        placeholder="e.g. Admin, Technician, Client, Finance Manager"></div>
    <div class="field"><label class="field-label">Expected active users per month *</label>
      <div class="chips" style="margin-top:4px">
        ${USER_VOLS.map(v => `<div class="chip ${f.monthlyUsers===v?'on':''}" onclick="update('monthlyUsers','${v}')">${v}</div>`).join('')}
      </div></div>
    <div class="field"><label class="field-label">Data volume expectation *</label>
      <div class="chips" style="margin-top:4px">
        ${DATA_VOLS.map(v => `<div class="chip ${f.dataVolume===v?'on':''}" onclick="update('dataVolume','${v}')">${v}</div>`).join('')}
      </div></div>`;

  // ── Step 6: Notes ──────────────────────────────────────────────────────────
  if (state.step === 6) stepContent = `
    <div class="step-eyebrow">Step 07 — Anything Else</div>
    <div class="step-title">Capture everything unusual.</div>
    <div class="step-desc">Hard deadlines, existing codebases, budget signals, compliance needs,
      decision timeline — anything that changes the scope picture.</div>
    <div class="field"><label class="field-label">Additional Notes</label>
      <textarea class="field-textarea" style="min-height:130px"
        oninput="update('notes',this.value)"
        placeholder="e.g. They need this live in 8 weeks. Budget signal: ~R150k. POPIA compliance is a hard requirement. Decision by end of month."
      >${f.notes}</textarea></div>`;

  // ── Step 7: Assessment ─────────────────────────────────────────────────────
  if (state.step === 7) {
    const a = state.assessment;
    stepContent = `
    <div class="step-eyebrow">Step 08 — Complexity Assessment</div>
    <div class="step-title">Get the AI read on this scope.</div>
    <div class="step-desc">Analyses data complexity and process depth to produce an hours estimate.
      For developer review only — this is NOT a final price. Apply your hourly rate after review.</div>
    ${!a && !state.loading
      ? `<div style="text-align:center;padding:40px 0">
           <button class="btn btn-primary" onclick="runAssessment()" style="padding:14px 32px">
             Run Assessment ↗
           </button></div>` : ''}
    ${state.loading
      ? `<div class="loader"><div class="loader-ring"></div><div class="loader-text">Analysing scope...</div></div>` : ''}
    ${a && !state.loading ? `
    <div class="assessment-card">
      <div class="assessment-top">
        <span class="complexity-badge ${badgeClass(a.complexityTier)}">${a.complexityTier}</span>
        ${!a.needsDeeperScoping && a.estimatedHoursMin > 0
          ? `<div><div class="hours-display">${a.estimatedHoursMin}–${a.estimatedHoursMax}h</div>
             <div class="hours-label">Estimated development hours</div></div>` : ''}
      </div>
      <div class="assessment-body">
        ${a.needsDeeperScoping ? `<div class="scoping-alert">
          <div class="scoping-alert-title">⚠ Deeper Scoping Required</div>
          <div class="scoping-alert-text">${a.scopingReason}</div></div>` : ''}
        <div class="assess-section"><div class="assess-section-title">Summary</div>
          <div class="assess-narrative">${a.scopeNotes}</div></div>
        ${a.keyDrivers?.length ? `<div class="assess-section"><div class="assess-section-title">Complexity Drivers</div>
          <ul class="assess-list">${a.keyDrivers.map(d =>
            `<li class="assess-item"><div class="assess-dot dot-green"></div><div class="assess-item-text">${d}</div></li>`
          ).join('')}</ul></div>` : ''}
        ${a.riskFlags?.length ? `<div class="assess-section"><div class="assess-section-title">Risk Flags</div>
          <ul class="assess-list">${a.riskFlags.map(r =>
            `<li class="assess-item"><div class="assess-dot dot-orange"></div><div class="assess-item-text">${r}</div></li>`
          ).join('')}</ul></div>` : ''}
        <div style="margin-top:8px">
          <button class="btn btn-ghost btn-sm" onclick="runAssessment()">Re-run</button>
        </div>
      </div>
    </div>` : ''}`;
  }

  const can = canProceed();
  return `<div class="container">
    <div class="progress">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-meta">
        <div class="progress-step-label">Step ${state.step + 1} of ${STEPS.length} · ${STEPS[state.step]}</div>
        <div class="progress-pct">${pct}%</div>
      </div>
    </div>
    ${stepContent}
    <div class="btn-row">
      ${state.step > 0 ? `<button class="btn btn-ghost" onclick="state.step--;render()">← Back</button>` : ''}
      ${state.step < STEPS.length - 1
        ? `<button class="btn btn-primary" onclick="state.step++;render()" ${!can ? 'disabled' : ''}>Continue →</button>` : ''}
      ${state.step === STEPS.length - 1 && state.assessment
        ? `<button class="btn btn-primary" onclick="submitLead()">Submit Lead ✓</button>` : ''}
    </div>
  </div>`;
}

function renderHeader() {
  if (!state.user) { document.getElementById("header-right").innerHTML = ''; return; }
  const myCount = state.user.isAdmin
    ? state.leads.length
    : state.leads.filter(l => l.agentId === state.user.id).length;
  document.getElementById("header-right").innerHTML = `
    <span class="agent-pill">${state.user.name}</span>
    <button class="nav-btn ${state.view==='form'&&!state.submitted?'active':''}" onclick="resetForm()">New Quote</button>
    ${!state.user.isAdmin
      ? `<button class="nav-btn ${state.view==='leads'?'active':''}" onclick="state.view='leads';render()">
           My Leads${myCount > 0 ? ' (' + myCount + ')' : ''}</button>` : ''}
    ${state.user.isAdmin
      ? `<button class="nav-btn ${state.view==='admin'?'active':''}" onclick="state.view='admin';render()">
           Dashboard (${myCount})</button>` : ''}
    <button class="nav-btn" onclick="state.user=null;state.view='unlock';render()">Sign Out</button>`;
}

function render() {
  renderHeader();
  let html = '';
  if      (state.view === 'unlock') html = renderUnlock();
  else if (state.view === 'form')   html = renderStep();
  else                              html = renderLeads();
  document.getElementById("root").innerHTML = html;
  document.getElementById("modal-root").innerHTML = state.selectedLead ? renderModal() : '';
  const ci = document.getElementById("code-input");
  if (ci) { ci.focus(); ci.setSelectionRange(ci.value.length, ci.value.length); }
}

// ─── GLOBAL HANDLERS ──────────────────────────────────────────────────────────
window.doUnlock = function() {
  const input = document.getElementById("code-input");
  const code  = (input ? input.value : state.codeInput).trim().toUpperCase();
  state.codeInput = code;
  if (code === ADMIN_CODE) {
    state.user = { id: "admin", name: "Admin", isAdmin: true };
    state.view = "admin"; render(); return;
  }
  const agent = AGENTS.find(a => a.code === code);
  if (agent) { state.user = agent; state.view = "form"; render(); return; }
  state.codeError = true; render();
  setTimeout(() => { state.codeError = false; render(); }, 2000);
};

window.update      = update;
window.toggleArr   = toggleArr;
window.runAssessment = runAssessment;
window.submitLead  = submitLead;
window.resetForm   = resetForm;
window.updateStatus = updateStatus;

window.addEntity = function() {
  const val = state.customEntity.trim();
  if (!val) return;
  if (!state.form.entities.includes(val)) state.form.entities.push(val);
  state.customEntity = ""; render();
};

window.openLead  = function(id) { state.selectedLead = state.leads.find(l => l.id === id) || null; render(); };
window.closeModal = function() { state.selectedLead = null; render(); };

// ─── BOOT ─────────────────────────────────────────────────────────────────────
render();       // show unlock screen immediately
loadLeads();    // async — re-renders once leads arrive from Supabase
</script>
</body>
</html>
